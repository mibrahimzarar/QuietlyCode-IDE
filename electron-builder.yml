appId: com.quietlycode.ide
productName: QuietlyCode
copyright: Copyright © 2026 QuietlyCode

directories:
  buildResources: build
  output: dist

# Include compiled output + package.json (for main entry point)
files:
  - out/**/*
  - package.json

asar: true
# node-pty and other native .node binaries must be outside the asar archive
asarUnpack:
  - "**/*.node"
  - "**/node_modules/node-pty/**"

# ─── Windows ─────────────────────────────────────────────────────────────────
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: QuietlyCode
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  differentialPackage: false

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch: [universal]   # single DMG works on both Intel & Apple Silicon

dmg:
  title: "QuietlyCode ${version}"
  icon: build/icon.icns
  iconSize: 80
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 360

# ─── Linux ───────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png      # 512×512 PNG
  category: Development
  description: Offline-First Local AI IDE powered by llama.cpp and AirLLM
  maintainer: QuietlyCode <support@quietlycode.app>
  desktop:
    Name: QuietlyCode
    Comment: Offline-First Local AI IDE
    Categories: Development;IDE;TextEditor;
    Keywords: IDE;AI;Code;Editor;LLM;
    StartupWMClass: QuietlyCode
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64]

deb:
  packageCategory: devel
  depends:
    - libnotify4
    - libxtst6
    - libnss3
    - libsecret-1-0

rpm:
  packageCategory: Development/Tools

# ─── Auto-update (self-hosted generic server) ────────────────────────────────
# Installers and latest.yml are uploaded to your own domain.
# Replace https://releases.quietlycode.app with your actual releases URL.
publish:
  provider: generic
  url: https://releases.quietlycode.app
