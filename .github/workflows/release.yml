name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v1.2.3 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read    # private repo — only read access needed

jobs:
  # ─── Linux: AppImage + .deb + .rpm ─────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build tools (for node-pty)
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Build app
        run: npm run build

      - name: Package Linux
        # publish=never — we upload to our own server, not GitHub Releases
        run: npx electron-builder --linux AppImage deb rpm --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*.{AppImage,deb,rpm}
          if-no-files-found: error

  # ─── Windows: NSIS installer (.exe) ────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Windows
        run: npx electron-builder --win nsis --publish never
        env:
          # ── Windows Code Signing (uncomment when you have a cert) ──
          # CSC_LINK:         ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.exe
          if-no-files-found: error

  # ─── macOS: Universal .dmg (Intel + Apple Silicon) ─────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package macOS (Universal)
        run: npx electron-builder --mac dmg --publish never
        env:
          # ── macOS Notarization (uncomment when you have Apple certs) ──
          # APPLE_ID:                    ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK:                    ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD:            ${{ secrets.MAC_CSC_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: dist/*.dmg
          if-no-files-found: error

  # ─── Deploy: upload all installers to your release server ──────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten dist-all into a single folder
        run: |
          mkdir -p release-upload
          find dist-all -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.dmg" -o -name "*.yml" \) \
            -exec cp {} release-upload/ \;
          ls -lh release-upload/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch version placeholder in website download page
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          sed -i "s/VERSION_PLACEHOLDER/${VER}/g" QuietlyCode-website/app/download/page.tsx
          echo "Patched download page to v${VER}"

      - name: Deploy via SCP to release server
        # Requires these GitHub secrets:
        #   DEPLOY_HOST   — your server hostname or IP, e.g. releases.quietlycode.app
        #   DEPLOY_USER   — SSH user on your server, e.g. deploy
        #   DEPLOY_KEY    — private SSH key (contents of id_ed25519)
        #   DEPLOY_PATH   — remote path, e.g. /var/www/releases/quietlycode.app/public
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   "release-upload/*"
          target:   "${{ secrets.DEPLOY_PATH }}/${{ github.ref_name }}"
          strip_components: 1

      - name: SSH — update 'latest' symlink and generate latest.yml
        # electron-updater looks for latest.yml / latest-linux.yml / latest-mac.yml
        # at the root of your releases URL. We symlink the new version folder → latest/.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            BASE="${{ secrets.DEPLOY_PATH }}"
            VER="${{ github.ref_name }}"

            # Symlink latest → this version
            ln -sfn "$BASE/$VER" "$BASE/latest"

            # Copy the auto-updater manifests to the root (electron-updater requirement)
            cp "$BASE/$VER/latest.yml"        "$BASE/latest.yml"        2>/dev/null || true
            cp "$BASE/$VER/latest-linux.yml"  "$BASE/latest-linux.yml"  2>/dev/null || true
            cp "$BASE/$VER/latest-mac.yml"    "$BASE/latest-mac.yml"    2>/dev/null || true

            # version.txt — used by the Linux install.sh script
            echo "${VER#v}" > "$BASE/version.txt"

            echo "Deployed QuietlyCode $VER"
