name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v1.2.3 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ─── Linux: AppImage + .deb + .rpm ─────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build tools (for node-pty)
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Build & publish Linux
        run: npx electron-builder --linux AppImage deb rpm --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows: NSIS installer (.exe) ────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Windows
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Windows Code Signing (uncomment when you have a cert) ──
          # CSC_LINK:         ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  # ─── macOS: Universal .dmg (Intel + Apple Silicon) ─────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish macOS (Universal)
        run: npx electron-builder --mac dmg --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS Notarization (uncomment when you have Apple certs) ──
          # APPLE_ID:                    ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK:                    ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD:            ${{ secrets.MAC_CSC_KEY_PASSWORD }}
